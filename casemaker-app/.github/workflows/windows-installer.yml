name: Windows installer

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: casemaker-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: casemaker-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            casemaker-app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('casemaker-app/src-tauri/Cargo.toml') }}

      - name: Install npm deps
        run: npm ci

      - name: Generate platform icons from source PNG
        run: npx tauri icon ./src-tauri/icons/icon.png

      - name: Build SPA + Tauri Windows bundle
        run: npm run tauri:build

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: case-maker-windows-msi
          path: casemaker-app/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: case-maker-windows-nsis
          path: casemaker-app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30
